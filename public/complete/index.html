<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmed | Lotus's Shop Online</title>
<style>
:root{--bg:#f5f5f5;--card:#fff;--text:#1a1a1a;--text2:#666;--accent:#00a651;--radius:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border-radius:16px;padding:48px 40px;text-align:center;max-width:480px;width:100%;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.check{width:64px;height:64px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:3}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
.order-id{font-size:14px;color:var(--text2);margin-bottom:24px;letter-spacing:2px;font-weight:600}
.details{background:var(--bg);border-radius:var(--radius);padding:16px;margin-bottom:24px;text-align:left}
.details p{font-size:14px;color:var(--text2);margin-bottom:4px}
.details p strong{color:var(--text);display:block;font-size:16px;margin-bottom:2px}
.btn{display:inline-block;padding:12px 32px;background:var(--accent);color:#fff;border-radius:var(--radius);text-decoration:none;font-size:15px;font-weight:600;transition:background .2s}
.btn:hover{background:#008c44}
</style>
<script>window._fbPixelsReady = true;</script>
<script src="/js/lotus-fb-pixel.js" defer></script>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Order Confirmed!</h1>
  <div class="order-id" id="order-id">---</div>
  <div class="details" id="order-details"></div>
  <a class="btn" href="/">Back to Lotus's Shop Online</a>
</div>
<script>
(function(){
  var ref = 'LTS' + Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById('order-id').textContent = 'Order #' + ref;

  var detailsEl = document.getElementById('order-details');
  var orderData = null;
  try {
    var raw = localStorage.getItem('lotus_order');
    if (raw) {
      orderData = JSON.parse(raw);
      var h = '';
      if (orderData.amount) h += '<p><strong>Total</strong>RM ' + parseFloat(orderData.amount).toFixed(2) + '</p>';
      if (orderData.items && orderData.items.length > 0) {
        h += '<p><strong>Items</strong></p>';
        orderData.items.forEach(function(item) {
          h += '<p>' + (item.name || 'Item') + ' x' + (item.qty || 1) + ' - RM ' + (parseFloat(item.price)||0).toFixed(2) + '</p>';
        });
      }
      if (orderData.customerName) h += '<p><strong>Customer</strong>' + orderData.customerName + '</p>';
      if (orderData.email) h += '<p>' + orderData.email + '</p>';
      detailsEl.innerHTML = h;
    } else {
      detailsEl.innerHTML = '<p>Your grocery order has been placed successfully.</p>';
    }
  } catch(ex) {
    detailsEl.innerHTML = '<p>Your grocery order has been placed successfully.</p>';
  }

  var completeKey = 'lotusFbPurchaseComplete';
  if (orderData && !sessionStorage.getItem(completeKey)) {
    var amount = parseFloat(orderData.amount) || 0;
    var trackComplete = function() {
      if (typeof window.trackLotusFb === 'function') {
        window.trackLotusFb('Purchase', { value: amount, currency: orderData.currency || 'MYR' });
      } else if (window.fbq) {
        fbq('track', 'Purchase', { value: amount, currency: orderData.currency || 'MYR' });
      }
      try { sessionStorage.setItem(completeKey, '1'); } catch (e) {}
    };
    if (window.lotusFbPixelReady) {
      window.lotusFbPixelReady.then(trackComplete);
    } else {
      trackComplete();
    }
  }
})();
</script>
</body>
</html>
